spring.application.name=instagram-backend

spring.datasource.url=jdbc:mysql://localhost:3306/instagram_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

resilience4j.circuitbreaker.instances.loginCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.loginCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.loginCircuitBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.loginCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.loginCircuitBreaker.waitDurationInOpenState=60s
resilience4j.circuitbreaker.instances.loginCircuitBreaker.failureRateThreshold=50

app.upload.dir=${user.dir}/uploads



